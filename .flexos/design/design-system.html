<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingo.jpg - Design System</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      padding: var(--space-8);
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-12);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--color-border);
    }
    h1, h2, h3 { font-family: var(--font-display); }
    section { margin-bottom: var(--space-12); }
    .swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--space-4); }
    .swatch { height: 100px; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    .swatch-label { margin-top: var(--space-2); font-size: var(--font-size-sm); font-family: var(--font-mono); }
  </style>
</head>
<body>
  <header>
    <h1>Lingo.jpg Design System</h1>
    <button class="btn btn-surface" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">Toggle Theme</button>
  </header>

  <section>
    <h2>Colors</h2>
    <div class="swatch-grid">
      <div><div class="swatch" style="background: var(--color-primary)"></div><div class="swatch-label">--color-primary</div></div>
      <div><div class="swatch" style="background: var(--color-accent)"></div><div class="swatch-label">--color-accent</div></div>
      <div><div class="swatch" style="background: var(--color-bg)"></div><div class="swatch-label">--color-bg</div></div>
      <div><div class="swatch" style="background: var(--color-surface)"></div><div class="swatch-label">--color-surface</div></div>
      <div><div class="swatch" style="background: var(--color-surface-raised)"></div><div class="swatch-label">--color-surface-raised</div></div>
      <div><div class="swatch" style="background: var(--color-border)"></div><div class="swatch-label">--color-border</div></div>
    </div>
  </section>

  <section>
    <h2>Typography</h2>
    <div style="font-family: var(--font-display); font-size: var(--font-size-4xl); font-weight: var(--font-weight-black)">Display (Space Grotesk)</div>
    <div style="font-family: var(--font-body); font-size: var(--font-size-xl);">Body (Inter) - The quick brown fox jumps over the lazy dog.</div>
    <div style="font-family: var(--font-meme); font-size: var(--font-size-3xl); text-transform: uppercase; -webkit-text-stroke: 1px black; color: white; text-shadow: 2px 2px 0 #000;">Meme (Impact)</div>
  </section>
</body>
</html>
